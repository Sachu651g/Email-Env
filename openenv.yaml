metadata:
  name: "openenv-email-ops"
  version: "1.0.0"
  description: "Enterprise inbox simulation RL environment for AI agent training — classify, prioritize, route, and reply to emails with memory-based reward shaping and partial observability."
  author: "Sachin S Gunagi"
  license: "MIT"
  hf_space: "https://huggingface.co/spaces/sachingunagi66/openenv-email-ops"
  github: "https://github.com/Sachu651g/AI-Oversight-Inspector"
  theme: "World Modeling / Personalized Tasks"
  hackathon: "Meta x Hugging Face OpenEnv Hackathon 2026"

tasks:
  - task_id: "easy"
    description: "Classify emails only. Single-component evaluation with small inbox. Agent must distinguish spam / important / promotion from noisy email content without ground truth labels."
    difficulty: "easy"
    max_steps: 30
    inbox_size: 5
    reward_components:
      - "classification"

  - task_id: "medium"
    description: "Classify, prioritize, and route emails. Three-component evaluation with medium inbox. Agent must handle VIP emails correctly or face delayed penalties."
    difficulty: "medium"
    max_steps: 50
    inbox_size: 8
    reward_components:
      - "classification"
      - "prioritization"
      - "routing"

  - task_id: "hard"
    description: "Full pipeline: classify, prioritize, route, and generate replies. Four-component evaluation with large inbox. VIP ignore penalty shapes long-horizon behavior."
    difficulty: "hard"
    max_steps: 80
    inbox_size: 10
    reward_components:
      - "classification"
      - "prioritization"
      - "routing"
      - "reply"

observation_schema:
  current_email:
    type: "Email | null"
    description: "The current email to process; null when inbox is empty"
    fields:
      id: "str"
      subject: "str"
      body: "str"
      sender_type: "Literal['customer', 'spammer', 'VIP', 'internal']"
      urgency_score: "float (0.0 to 1.0)"
  inbox_summary:
    type: "InboxSummary"
    description: "Aggregate statistics about the remaining inbox"
    fields:
      counts_by_sender_type: "dict[str, int]"
      urgency_distribution: "dict[str, int]"
  action_history:
    type: "list[Action]"
    description: "All actions taken so far in the current episode"
  step_count:
    type: "int"
    description: "Number of steps taken in the current episode"

action_schema:
  classify_email:
    value_format: "Literal['spam', 'important', 'promotion']"
    description: "Classify the current email into one of three categories"
  prioritize_email:
    value_format: "Literal['low', 'medium', 'high']"
    description: "Assign a priority level to the current email"
  route_email:
    value_format: "Literal['support', 'sales', 'escalation']"
    description: "Route the current email to the appropriate team"
  generate_reply:
    value_format: "str (free text, minimum 20 characters)"
    description: "Generate a professional reply to the current email"
  defer_email:
    value_format: "null"
    description: "Move the current email to the end of the inbox. Costs -0.05/step. Deferring same email 3+ times triggers -0.5 penalty."

reward_summary:
  correct_classification: "+0.2"
  correct_prioritization: "+0.2"
  correct_routing: "+0.2"
  reply_quality: "0.0 to +0.2 (heuristic)"
  efficiency_bonus: "+0.1 (decision on first step)"
  wrong_classification: "-0.2"
  deferral_penalty: "-0.05 per defer"
  vip_ignore_penalty: "-0.3 (VIP not handled within 3 steps)"
  excessive_deferral: "-0.5 (same email deferred 3+ times)"
  vip_consistency_bonus: "+0.3 (all VIP emails handled correctly)"
